name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  tests:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8]  # 3.7
        gcc-version: [8]  # 6, 7

    steps:
    - name: Checkout
      uses: actions/checkout@v2

    # - name: setup-python fix for local runs with nektos/act
    #   run: |
    #     #  Hack to get setup-python to work on act
    #     #  https://github.com/nektos/act/issues/251#issuecomment-706412948
    #     if [ $GITHUB_ACTOR == "nektos/act" ]; then
    #       apt update -y
    #       apt install -y build-essential
    #       if [ ! -f "/etc/lsb-release" ] ; then
    #         echo "DISTRIB_RELEASE=18.04" > /etc/lsb-release
    #       fi
    #     fi

    - name: Cache Conda
      uses: actions/cache@v1
      env:
        # Increase this value to reset cache manually
        CACHE_NUMBER: 0
      with:
        path: ~/conda_pkgs_dir
        key:
          ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-${{ hashFiles('environment.yml') }}

    - name: Cache pip
      uses: actions/cache@v1
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-${{ matrix.python-version }}-pip-${{ hashFiles('**/setup.py') }}

    - name: Setup Conda
      uses: conda-incubator/setup-miniconda@v2
      with:
        environment-file: environment.yml
        miniconda-version: "latest"
        python-version: ${{ matrix.python-version }}
        channel-priority: strict
        use-only-tar-bz2: true # IMPORTANT: This needs to be set for caching to work properly!

    - name: Install OS dependencies
      run: |
        export GXX="g++-${{ matrix.gcc-version }}" GCC="gcc-${{ matrix.gcc-version }}"
        sudo -E apt-add-repository -y "ppa:ubuntu-toolchain-r/test"
        sudo apt-get -q update
        sudo -E apt-get -yq --no-install-suggests --no-install-recommends $(travis_apt_get_options) install libxkbcommon-x11-0 $GXX
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/$GXX 0
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/$GCC 0
        g++ --version
        gcc --version

    - name: Install python dependencies
      shell: bash -l {0}
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install ".[test]"

    - name: Test with pytest
      shell: bash -l {0}
      run: |
        /sbin/start-stop-daemon --start --quiet --pidfile /tmp/custom_xvfb_99.pid --make-pidfile --background --exec /usr/bin/Xvfb -- :99 -ac -screen 0 1400x900x24
        sleep 3
        # test parallel version
        python setup.py build_ext --inplace --with-tests
        python setup.py test -v
        python setup.py benchmark -v

        # test series version
        export BUILD_SERIAL_FOAM=1
        python setup.py build_ext --inplace --with-tests
        python setup.py test -v
        python setup.py benchmark -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v1
